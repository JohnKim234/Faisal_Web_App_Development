<!DOCTYPE html>
<html>
<head>
    <title>Devices</title>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <img src="/static/home_icon.png" alt="Home" class="icon">
            <a href="/dashboard">Dashboard</a>
            <a class="active" href="/devices">Devices</a>
            <a href="/reports">Reports</a>
            <a href="/settings">Settings</a>
        </div>
        <div class="main">
            <h2>Devices</h2>
            <div class="device-list">
                <div class="device">
                    <span>TV (ON)</span>
                    <input type="checkbox" checked>
                </div>
                <div class="device">
                    <span>Refrigerator (ON)</span>
                    <input type="checkbox" checked>
                </div>
                <div class="device">
                    <span>Washing Machine (OFF) </span>
                    <img src="/static/warning_icon.png" alt="Warning" width="16" height="16">
                    <input type="checkbox">
                </div>
                <div class="device">
                    <span>Heater (ON)</span>
                    <input type="checkbox" checked>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
